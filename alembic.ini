[alembic]
script_location = alembic
prepend_sys_path = .

# Uses DATABASE_URL env var; fallback keeps local dev working.
# URL is set dynamically in alembic/env.py based on ALEMBIC_DB env var.
# Set DATABASE_URL env var to override (e.g. for Postgres).
sqlalchemy.url = sqlite:///users.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
