[alembic]
script_location = alembic
prepend_sys_path = .

# ── SQLite (local dev, default) ────────────────────────────────────────────────
# The active DB is selected via ALEMBIC_DB env var (users/trades/portfolio/budget/markets).
# URL is constructed dynamically in alembic/env.py; this line is the fallback shown
# in alembic's own help output only.
sqlalchemy.url = sqlite:///users.db

# ── PostgreSQL (production) ────────────────────────────────────────────────────
# Set DATABASE_URL in your environment, then select the domain with ALEMBIC_DB.
#
# Example — migrate all five schemas:
#   export DATABASE_URL=postgresql://user:pass@host:5432/optionflow
#   for db in users trades portfolio budget markets; do
#       ALEMBIC_DB=$db alembic upgrade head
#   done
#
# The env.py will:
#   1. Create the schema if it doesn't exist  (e.g. CREATE SCHEMA IF NOT EXISTS "portfolio")
#   2. Set search_path to that schema for the connection
#   3. Store alembic_version inside the schema  (e.g. portfolio.alembic_version)

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
